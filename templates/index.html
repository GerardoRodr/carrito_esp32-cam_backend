<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Control Gestual</title>
    <style>
        /* Estilos Base - Dark Mode Industrial */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #00bcd4;
            --success: #4CAF50;
            --danger: #f44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(0, 188, 212, 0.3);
        }

        /* Layout Principal */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            width: 100%;
            max-width: 1400px;
            justify-content: center;
            align-items: flex-start;
        }

        /* Paneles */
        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 4px solid var(--accent);
        }

        .video-panel {
            flex: 2;
            min-width: 320px;
        }

        .controls-panel {
            flex: 1;
            min-width: 320px;
            border-top-color: var(--danger);
        }

        .panel-title {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            width: 100%;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            text-align: center;
        }

        .video-container {
            width: 100%;
            max-width: 640px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            border: 2px solid #333;
            position: relative;
        }

        .video-container img {
            width: 100%;
            display: block;
        }

        /* Panel de Estado (Derecha) */
        .stats-panel {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
            text-align: center;
            border-left: 4px solid #444;
            transition: transform 0.2s ease, border-color 0.3s;
        }

        .stat-label {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            font-family: monospace;
        }

        /* Colores */
        .card-fps {
            border-color: var(--success);
        }

        .card-gesto {
            border-color: var(--accent);
        }

        .card-comando {
            border-color: var(--danger);
        }

        .val-fps {
            color: var(--success);
        }

        .val-gesto {
            color: var(--accent);
        }

        .val-comando {
            color: var(--danger);
        }

        /* Botones y Controles */
        .btn {
            display: inline-block;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            color: #fff;
            background-color: #333;
            border: 2px solid #555;
            border-radius: 10px;
            margin: 5px;
            width: 80px;
            transition: all 0.2s;
        }

        .btn:active {
            transform: translateY(4px);
            background-color: #555;
        }

        .btn-red {
            background-color: #b71c1c;
            border-color: #f44336;
        }

        .btn-red:active {
            background-color: #d32f2f;
        }

        .btn-blue {
            background-color: #01579b;
            border-color: #03a9f4;
        }

        .btn-blue:active {
            background-color: #0277bd;
        }

        .btn-green {
            background-color: #1b5e20;
            border-color: #4CAF50;
        }

        .btn-mode {
            width: 100%;
            margin-bottom: 10px;
        }

        .pad-direccional {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type=range] {
            width: 100%;
            margin: 15px 0;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <h1>Carrito Controlado por Gestos</h1>

    <div class="dashboard">
        <!-- Izquierda: Stream de Video -->
        <div class="panel video-panel">
            <div class="panel-title">Transmisión de Cámara ESP32</div>
            <div class="video-container">
                <img src="/video_feed" alt="Esperando conexión de video...">
            </div>
        </div>

        <!-- Centro: Controles Manuales -->
        <div class="panel controls-panel">
            <div class="panel-title">Modo de Operación</div>
            <button class="btn btn-mode btn-green" id="btn-modo-auto" onclick="setModo('auto')">Visión Gestual</button>
            <button class="btn btn-mode" id="btn-modo-manual" onclick="setModo('manual')">Control Manual</button>

            <div class="panel-title" style="margin-top: 20px;">Control de Potencia</div>
            <input type="range" min="80" max="255" value="100" id="sliderVel" onchange="cambiarVel(this.value)">
            <p style="color: var(--text-muted); margin-bottom: 20px;">Potencia: <span id="txtVel"
                    style="color: white; font-weight: bold;">100</span> / 255</p>

            <div class="panel-title">Prueba de Motores</div>
            <div class="pad-direccional" id="pad-motores" style="opacity: 0.5; pointer-events: none;">
                <div>
                    <button class="btn" onmousedown="fetchDir('/adelante')" onmouseup="fetchDir('/parar')"
                        ontouchstart="fetchDir('/adelante')" ontouchend="fetchDir('/parar')">▲</button>
                </div>
                <div>
                    <button class="btn" onmousedown="fetchDir('/izquierda')" onmouseup="fetchDir('/parar')"
                        ontouchstart="fetchDir('/izquierda')" ontouchend="fetchDir('/parar')">◄</button>
                    <button class="btn btn-red" onclick="fetchDir('/parar')">■</button>
                    <button class="btn" onmousedown="fetchDir('/derecha')" onmouseup="fetchDir('/parar')"
                        ontouchstart="fetchDir('/derecha')" ontouchend="fetchDir('/parar')">►</button>
                </div>
                <div>
                    <button class="btn" onmousedown="fetchDir('/atras')" onmouseup="fetchDir('/parar')"
                        ontouchstart="fetchDir('/atras')" ontouchend="fetchDir('/parar')">▼</button>
                </div>
            </div>
            <p id="aviso-manual" style="color: var(--danger); font-size: 0.8rem; text-align: center; margin-top: 10px;">
                Activa el Modo Manual para usar los controles.</p>
        </div>

        <!-- Derecha: Métricas en Tiempo Real -->
        <div class="stats-panel">
            <div class="stat-card card-fps">
                <div class="stat-label">Rendimiento (FPS)</div>
                <div class="stat-value val-fps" id="txt-fps">--</div>
            </div>

            <div class="stat-card card-gesto">
                <div class="stat-label">Gesto Detectado</div>
                <div class="stat-value val-gesto" id="txt-gesto">--</div>
            </div>

            <div class="stat-card card-comando">
                <div class="stat-label">Comando al Motor</div>
                <div class="stat-value val-comando" id="txt-comando">--</div>
            </div>
        </div>
    </div>

    <!-- Script sin dependencias para actualizar métricas y enviar comandos -->
    <script>
        const ipCarrito = "{{ url_carrito }}";
        let modoActual = "auto";

        function updateStats() {
            fetch('/stats')
                .then(response => {
                    if (!response.ok) throw new Error("Error HTTP");
                    return response.json();
                })
                .then(data => {
                    document.getElementById('txt-fps').innerText = data.fps;
                    document.getElementById('txt-gesto').innerText = data.gesto;

                    // Sincronizar el estado del frontend con el backend por si cambió desde otra pestaña
                    if (data.modo !== modoActual) {
                        setModoUI(data.modo);
                    }

                    // Si estamos en manual, mostrar que el comando de la IA está anulado
                    if (modoActual === "manual") {
                        document.getElementById('txt-comando').innerText = "BLOQUEADO (MANUAL)";
                    } else {
                        document.getElementById('txt-comando').innerText = data.comando;
                    }
                })
                .catch(err => {
                    console.log("Conexión perdida o servidor ocupado:", err);
                });
        }

        function setModo(modo) {
            // Decirle a Python que pare la IA o la active
            fetch(`/set_mode?estado=${modo}`).then(() => setModoUI(modo));
        }

        function setModoUI(modo) {
            modoActual = modo;
            const btnAuto = document.getElementById('btn-modo-auto');
            const btnManual = document.getElementById('btn-modo-manual');
            const pad = document.getElementById('pad-motores');
            const aviso = document.getElementById('aviso-manual');

            if (modo === 'auto') {
                btnAuto.className = "btn btn-mode btn-green";
                btnAuto.innerHTML = "Visión Gestual";
                btnManual.className = "btn btn-mode";
                btnManual.innerHTML = "Control Manual";
                pad.style.opacity = "0.5";
                pad.style.pointerEvents = "none";
                aviso.style.display = "block";
            } else {
                btnAuto.className = "btn btn-mode";
                btnAuto.innerHTML = "Visión Gestual";
                btnManual.className = "btn btn-mode btn-red";
                btnManual.innerHTML = "Control Manual";
                pad.style.opacity = "1";
                pad.style.pointerEvents = "auto";
                aviso.style.display = "none";
            }
        }

        function fetchDir(endpoint) {
            if (modoActual !== "manual") return;
            // Gracias al CORS configurado en el ESP32, el navegador puede llamarlo directo!
            // Usamos keepalive: true para reusar el socket TCP y bajar la latencia a ~15ms
            fetch(`${ipCarrito}${endpoint}`, { mode: 'no-cors', keepalive: true }).catch(e => console.error(e));
        }

        function cambiarVel(valor) {
            document.getElementById('txtVel').innerText = valor;
            fetch(`${ipCarrito}/velocidad?v=${valor}`, { mode: 'no-cors', keepalive: true }).catch(e => console.error(e));
        }

        // Consultar el estado cada 150ms para sensación de tiempo real
        setInterval(updateStats, 150);
        updateStats();
    </script>
</body>

</html>
